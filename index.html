            'qualificacao-avancada': {
                render: () => {
                    const questions = ["Quem vai utilizar o plano além de você?", "Idade aproximada dos beneficiários?", "Atualmente possui plano?", "Faz questão de algum hospital/clínica?", "Possui CNPJ ativo?", "Vínculo com entidade/profissão?", "Incluirá funcionários?", "Situação específica (cirurgia/exame)?", "Já recebeu outra proposta?"];
                    return `
                    <div class="fade-in space-y-6 text-left">
                        <div class="bg-blue-700 p-8 rounded-3xl text-white shadow-lg flex items-center gap-6">
                            <div class="p-3 bg-white/20 rounded-2xl"><i data-lucide="clipboard-check" class="w-8 h-8"></i></div>
                            <div>
                                <h2 class="text-3xl font-black uppercase italic tracking-tighter leading-none">Qualificação Avançada</h2>
                                <p class="text-blue-100 text-[10px] font-bold uppercase tracking-widest mt-2">Diagnóstico New Master Méier</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            <div class="lg:col-span-8 space-y-3">
                                ${questions.map((q, i) => `
                                    <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between group hover:border-master transition-all">
                                        <div class="flex items-center gap-4">
                                            <span class="text-master font-black text-sm">${i + 1}.</span>
                                            <p class="text-slate-700 font-semibold text-sm">${q}</p>
                                        </div>
                                        <button onclick="handleCopy('${q.replace(/'/g, "\\'")}')" class="p-2 text-slate-300 hover:text-master hover:bg-blue-50 rounded-lg transition-all"><i data-lucide="copy" class="w-4 h-4"></i></button>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="lg:col-span-4 space-y-6">
                                <div class="bg-[#0F172A] p-6 rounded-3xl text-white shadow-xl">
                                    <h4 class="text-master font-black text-xs uppercase tracking-widest mb-4">Dicas de Sucesso</h4>
                                    <ul class="space-y-4 text-xs font-medium text-slate-300 italic">
                                        <li class="flex items-start gap-2"><i data-lucide="info" class="w-3 h-3 mt-0.5 shrink-0"></i>Não bombardeie o cliente.</li>
                                        <li class="flex items-start gap-2"><i data-lucide="info" class="w-3 h-3 mt-0.5 shrink-0"></i>Transforme dados em conversa.</li>
                                        <li class="flex items-start gap-2"><i data-lucide="info" class="w-3 h-3 mt-0.5 shrink-0"></i>O silêncio do cliente diz muito.</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }
            }
        };

        function toggleSubmenu(id) {
            const sub = document.getElementById(`sub-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            const isHidden = sub.classList.toggle('hidden');
            icon.style.transform = isHidden ? 'rotate(0deg)' : 'rotate(90deg)';
        }

        function navigateTo(id) {
            const area = document.getElementById('content-area');
            let contentHtml = '';
            document.querySelectorAll('.nav-item, .submenu-item').forEach(el => el.classList.toggle('sidebar-item-active', el.getAttribute('data-tab') === id));
            
            if (id.includes('-')) {
                const parts = id.split('-');
                const mod = parts[0], section = parts[1];
                if (otherData[id]) {
                    contentHtml = otherData[id].render ? otherData[id].render() : createGenericView(otherData[id].title, otherData[id].content, id);
                } else if (technicalData[mod] && technicalData[mod][section]) {
                    const item = technicalData[mod];
                    const titles = { contratacao: "Contratação", vigencia: "Vigência", carencia: "Carência", documentacao: "Documentação", reajuste: "Reajuste", cancelamento: "Cancelamento", preco: "Análise de Preço", total: "Coparticipação Total", parcial: "Coparticipação Parcial", sem: "Sem Coparticipação", ambulatorial: "Ambulatorial", hospitalar: "Hospitalar", sob: "Sem Obstetrícia", cob: "Com Obstetrícia", completo: "Plano Completo", enfermaria: "Enfermaria (Coletivo)", apartamento: "Apartamento (Privativo)", diferencas: "Quadro Comparativo" };
                    contentHtml = createGenericView(titles[section], item[section], mod, section);
                }
            } else {
                const item = otherData[id];
                contentHtml = item.render ? item.render() : createGenericView(item.title, item.content, id);
            }
            area.innerHTML = contentHtml;
            lucide.createIcons();
            if (window.innerWidth < 1024) document.getElementById('sidebar').classList.add('-translate-x-full');
        }

        function createGenericView(title, content, mod, section = null) {
            return `<div class="fade-in max-w-4xl mx-auto space-y-8 text-left">
                <div class="bg-white rounded-[3rem] shadow-xl border overflow-hidden border-slate-100">
                    <div class="p-10 bg-[#0F172A] text-white">
                        <h2 class="text-4xl font-black italic uppercase tracking-tighter">${title}</h2>
                    </div>
                    <div class="p-10">
                        <div class="bg-slate-50 p-8 rounded-3xl border border-dashed border-slate-200">
                            <p class="whitespace-pre-line text-slate-700 text-lg font-medium leading-relaxed">${content}</p>
                        </div>
                        <button onclick="handleManualCopy('${mod}', ${section ? `'${section}'` : 'null'})" class="mt-8 flex items-center gap-3 px-10 py-4 bg-master text-white rounded-2xl font-black uppercase text-xs shadow-xl hover:scale-105 transition-all">
                            <i data-lucide="copy" class="w-4 h-4"></i> Copiar Informação
                        </button>
                    </div>
                </div>
            </div>`;
        }

        function handleManualCopy(mod, section) {
            let text = section ? technicalData[mod][section] : otherData[mod].content;
            handleCopy(text);
        }

        function handleCopy(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const notif = document.getElementById('notif');
            notif.classList.remove('translate-y-32');
            setTimeout(() => notif.classList.add('translate-y-32'), 2500);
        }

        document.getElementById('mobile-toggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('-translate-x-full'));
        window.onload = () => { lucide.createIcons(); navigateTo('dashboard'); };
    </script>
</body>
</html>
